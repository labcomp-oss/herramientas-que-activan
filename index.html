  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bottom:8px;\">Autodiagnóstico: mirá tu rol en la clase<\u002Fh2>\n        <p style=\"font-size:1.02rem; line-height:1.5; color:#5b6770; max-width:560px;\">Antes de explorar las herramientas, tomate unos minutos para <strong style=\"color:#82378C; font-weight:700;\">reflexionar sobre tu rol<\u002Fstrong> en la clase. Son <strong style=\"color:#82378C; font-weight:700;\">6 preguntas<\u002Fstrong>, sin respuestas correctas.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"{{ formUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"position:relative; z-index:2; display:inline-flex; align-items:center; gap:9px; background:#82378C; color:#fff; border:none; font-size:.95rem; font-weight:800; padding:14px 22px; border-radius:999px; font-family:inherit; white-space:nowrap;\" style-hover=\"opacity:.92;\"><i data-lucide=\"arrow-right\" style=\"width:17px; height:17px;\"><\u002Fi>Hacé el autodiagnóstico<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░░░░ HERRAMIENTAS ░░░░░ -->\n  <section id=\"herramientas\" style=\"max-width:1120px; margin:0 auto; padding:50px 24px 20px;\">\n    <div style=\"max-width:720px; margin-bottom:30px;\">\n      <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:#82378C; background:#82378C14; padding:7px 14px; border-radius:999px;\"><i data-lucide=\"layout-grid\" style=\"width:14px; height:14px;\"><\u002Fi>El kit · 6 herramientas<\u002Fdiv>\n      <h2 style=\"font-size:clamp(1.9rem, 3.4vw, 2.5rem); font-weight:800; line-height:1.08; margin:15px 0 13px;\">Herramientas para acompañar en el aula<\u002Fh2>\n      <p style=\"font-size:1.12rem; line-height:1.55; color:#5b6770;\">Recursos breves para acompañar las clases y ayudar a que <strong style=\"color:#23303a; font-weight:700;\">más estudiantes participen<\u002Fstrong> y desarrollen <strong style=\"color:#23303a; font-weight:700;\">confianza<\u002Fstrong>. Elegí una tarjeta, <strong style=\"color:#23303a; font-weight:700;\">completala y guardala<\u002Fstrong>.<\u002Fp>\n      <div style=\"display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:.86rem; font-weight:700; color:#00857c; background:#00a09618; padding:8px 15px; border-radius:999px;\"><span style=\"width:11px; height:11px; border-radius:999px; background:#00a096;\"><\u002Fspan>Observación<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:.86rem; font-weight:700; color:#82378C; background:#82378C18; padding:8px 15px; border-radius:999px;\"><span style=\"width:11px; height:11px; border-radius:999px; background:#82378C;\"><\u002Fspan>Acción<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(310px, 1fr)); gap:22px;\">\n      <sc-for list=\"{{ tools }}\" as=\"tool\" hint-placeholder-count=\"6\">\n        <div onclick=\"{{ tool.open }}\" style=\"position:relative; overflow:hidden; cursor:pointer; background:{{ tool.color }}; border-radius:24px; display:flex; flex-direction:column; min-height:300px; color:#fff; box-shadow:0 12px 28px {{ tool.shadow }}; transition:transform .16s ease, box-shadow .16s ease;\" style-hover=\"transform:translateY(-6px); box-shadow:0 26px 50px {{ tool.shadow }};\">\n          <div style=\"position:absolute; right:-70px; bottom:-90px; width:230px; height:230px; border-radius:50%; background:rgba(255,255,255,.09);\"><\u002Fdiv>\n          <div style=\"position:absolute; right:18px; top:18px; font-size:4.2rem; font-weight:800; line-height:1; color:rgba(255,255,255,.16);\">{{ tool.n }}<\u002Fdiv>\n          <span style=\"position:absolute; left:80px; top:26px; width:9px; height:9px; border-radius:999px; background:{{ tool.accent }};\"><\u002Fspan>\n          <span style=\"position:absolute; left:100px; top:46px; width:6px; height:6px; border-radius:999px; background:rgba(255,2 -for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ tool.open }}\" style=\"margin-top:auto; display:inline-flex; align-items:center; justify-content:center; gap:9px; background:#fff; color:{{ tool.color }}; font-size:.95rem; font-weight:800; padding:13px 18px; border-radius:999px; box-shadow:0 6px 16px rgba(0,0,0,.12);\">Abrí la herramienta <i data-lucide=\"arrow-right\" style=\"width:17px; height:17px;\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░░░░ FORO ░░░░░ -->\n  <section id=\"foro\" style=\"max-width:1120px; margin:0 auto; padding:54px 24px 60px;\">\n    <div style=\"position:relative; overflow:hidden; background:#00a096; color:#fff; border-radius:26px; padding:46px 44px;\">\n      <div style=\"position:absolute; right:-80px; bottom:-110px; width:280px; height:280px; border-radius:50%; background:rgba(255,255,255,.08);\"><\u002Fdiv>\n      <div style=\"position:relative; z-index:2; display:flex; gap:36px; align-items:center; flex-wrap:wrap;\">\n        <div style=\"flex:1; min-width:280px;\">\n          <span style=\"display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.18); font-size:11.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:7px 14px; border-radius:999px;\"><i data-lucide=\"messages-square\" style=\"width:14px; height:14px;\"><\u002Fi>Comunidad<\u002Fspan>\n          <h2 style=\"font-size:clamp(1.8rem, 3.2vw, 2.3rem); font-weight:800; line-height:1.1; margin:16px 0 12px;\">Compartí con otras docentes<\u002Fh2>\n          <p style=\"font-size:1.08rem; line-height:1.55; color:rgba(255,255,255,.94); max-width:480px;\">Un espacio para <strong style=\"color:#fff; font-weight:800;\">intercambiar<\u002Fstrong> sobre el uso de las herramientas en clase: <strong style=\"color:#fff; font-weight:800;\">qué probaste<\u002Fstrong>, <strong style=\"color:#fff; font-weight:800;\">qué observaste<\u002Fstrong> y <strong style=\"color:#fff; font-weight:800;\">qué aprendiste<\u002Fstrong> con tu grupo.<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:10px; margin:22px 0 26px;\">\n            <div style=\"display:flex; gap:10px; align-items:center;\"><i data-lucide=\"check-circle-2\" style=\"width:18px; height:18px; color:#CFF5DF;\"><\u002Fi><span style=\"font-size:1rem; color:rgba(255,255,255,.95);\">Qué herramienta probaste y cómo te fue<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:center;\"><i data-lucide=\"check-circle-2\" style=\"width:18px; height:18px; color:#CFF5DF;\"><\u002Fi><span style=\"font-size:1rem; color:rgba(255,255,255,.95);\">Qué observaste en la participación de tu grupo<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:center;\"><i data-lucide=\"check-circle-2\" style=\"width:18px; height:18px; color:#CFF5DF;\"><\u002Fi><span style=\"font-size:1rem; color:rgba(255,255,255,.95);\">Qué te resultó y qué mejorarías<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"{{ foroUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:10px; background:#fff; color:#00857c; font-size:1rem; font-weight:800; padding:15px 26px; border-radius:999px; box-shadow:0 10px 24px rgba(0,0,0,.16);\" style-hover=\"opacity:.93;\"><i data-lucide=\"users\" style=\"width:19px; height:19px;\"><\u002Fi>Sumate al foro<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"flex:0 0 250px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"background:rgba(255,255,255,.14); border-radius:16px; padding:15px 17px; display:flex; gap:12px; align-items:flex-start;\"><div style=\"width:34px; height:34px; flex-shrink:0; border-radius:999px; background:#50AF32; color:#08323f; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.9rem;\">M<\u002Fdiv><div><div style=\"font-size:.9rem; font-weight:700;\">Maestra · 5º<\u002Fdiv><div style=\"font-size:.86rem; color:rgba(255,255,255,.85); line-height:1.4;\">“Roté los roles técnicos y participaron tres niñas que casi no usaban la compu.”<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,.14); border-radius:16px; padding:15px 17px; display:flex; gap:12px; align-items:flex-start;\"><div style=\"width:34px; height:34px; flex-shrink:0; border-radius:999px; background:#FFC800; color:#08323f; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.9rem;\">D<\u002Fdiv><div><div style=\"font-size:.9rem; font-weight:700;\">Docente · 4º<\u002Fdiv><div style=\"font-size:.86rem; color:rgba(255,255,255,.85); line-height:1.4;\">“Probé el aviso anticipado y se animaron a participar varios más.”<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░░░░ FOOTER ░░░░░ -->\n  <footer style=\"background:#2a1a33; color:#fff;\">\n    <div style=\"max-width:1120px; margin:0 auto; padding:50px 24px 36px; display:flex; flex-wrap:wrap; gap:36px; justify-content:space-between;\">\n      <div style=\"max-width:360px;\">\n        <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:16px;\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 100 100\" fill=\"none\"><rect width=\"100\" height=\"100\" rx=\"27\" fill=\"#fff\"><\u002Frect><path d=\"M50 22 L56 44 L78 50 L56 56 L50 78 L44 56 L22 50 L44 44 Z\" fill=\"#82378C\"><\u002Fpath><circle cx=\"74\" cy=\"28\" r=\"6\" fill=\"#00a096\"><\u002Fcircle><circle cx=\"28\" cy=\"72\" r=\"4.5\" fill=\"#f7ca2f\"><\u002Fcircle><\u002Fsvg>\n          <span style=\"font-size:1.15rem; font-weight:800;\">Aula Activa<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:.98rem; line-height:1.55; color:rgba(255,255,255,.7);\">Herramientas para enseñar Pensamiento Computacional con perspectiva de género. Un recurso de <strong style=\"color:rgba(255,255,255,.92); font-weight:700;\">Ceibal<\u002Fstrong> para las y los docentes de aula.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:48px; flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-size:11.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:13px;\">Secciones<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:9px;\">\n            <a href=\"#autodiagnostico\" style=\"font-size:.98rem; color:rgba(255,255,255,.82);\" style-hover=\"color:#fff;\">Autodiagnóstico<\u002Fa>\n            <a href=\"#herramientas\" style=\"font-size:.98rem; color:rgba(255,255,255,.82);\" style-hover=\"color:#fff;\">Herramientas<\u002Fa>\n            <a href=\"#foro\" style=\"font-size:.98rem; color:rgba(255,255,255,.82);\" style-hover=\"color:#fff;\">Foro<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,.12);\">\n      <div style=\"max-width:1120px; margin:0 auto; padding:18px 24px; display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center;\">\n        <span style=\"font-size:.88rem; color:rgba(255,255,255,.5);\">© 2026 · Pensamiento Computacional con perspectiva de género<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- ░░░░░ FICHA (overlay) ░░░░░ -->\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div class=\"ov\" onclick=\"{{ closeModal }}\" style=\"position:fixed; inset:0; z-index:100; background:rgba(15,32,44,.55); backdrop-filter:blur(4px); display:flex; align-items:flex-start; justify-content:center; padding:28px 20px; overflow-y:auto;\">\n    <div class=\"sheet\" onclick=\"{{ stop }}\" style=\"position:relative; width:100%; max-width:720px; background:#fff; border-radius:22px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.35); margin:auto;\">\n      <button class=\"no-print\" onclick=\"{{ closeModal }}\" style=\"position:absolute; top:16px; right:16px; z-index:6; width:36px; height:36px; border:none; border-radius:999px; background:rgba(255,255,255,.2); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:rgba(255,255,255,.34);\"><i data-lucide=\"x\" style=\"width:19px; height:19px;\"><\u002Fi><\u002Fbutton>\n      <div style=\"background:{{ active.color }}; color:#fff; padding:30px 34px 26px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.18); font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:6px 13px; border-radius:999px;\"><span style=\"width:7px; height:7px; border-radius:999px; background:#fff;\"><\u002Fspan>{{ active.catLabel }}<\u002Fspan>\n        <div style=\"display:flex; align-items:flex-start; gap:16px; margin-top:16px;\">\n          <div style=\"width:56px; height:56px; flex-shrink:0; border-radius:15px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center;\"><i data-lucide=\"{{ active.icon }}\" style=\"width:28px; height:28px;\"><\u002Fi><\u002Fdiv>\n          <div>\n            <h2 style=\"font-size:1.5rem; font-weight:800; line-height:1.14;\">{{ active.title }}<\u002Fh2>\n            <p style=\"font-size:1rem; line-height:1.5; color:rgba(255,255,255,.92); margin-top:7px;\">{{ active.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex; align-items:center; gap:7px; margin-top:16px; background:rgba(255,255,255,.14); padding:7px 14px; border-radius:999px; font-size:.82rem; font-weight:600;\"><i data-lucide=\"clock\" style=\"width:14px; height:14px;\"><\u002Fi>Cuándo usarla: {{ active.momento }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sheet-body\" style=\"padding:24px 34px 30px;\">\n        <sc-if value=\"{{ active.porque }}\">\n          < on>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { open:null, checks:{}, radios:{}, texts:{}, dates:{}, adOpen:false, adStep:0, adAnswers:{} };\n\n  foroUrl = \"#\"; // ← reemplazar por la URL del Google Group\n  formUrl = \"https://forms.gle/Ha4WB8N3xQRNeD9f7\"; // Autodiagnóstico (Google Form)\n\n  cats = {\n    obs: { label:\"Observación\", color:\"#00a096\" },\n    acc: { label:\"Acción\",      color:\"#82378C\" }\n  };\n\n  data = [\n    { cat:\"obs\", icon:\"eye\", title:\"Observá la participación\",\n      desc:\"Prestá atención a quiénes participan, quiénes lideran y quiénes quedan en segundo plano.\",\n      momento:\"Durante la clase\",\n      encontras:[\"Preguntas guía para observar la dinámica\",\"Una ficha rápida para marcar al cierre\",\"Un espacio para pensar la próxima clase\"],\n      porqueLead:\"La participación no siempre se distribuye igual entre estudiantes.\",\n      porque:\"Observar estos patrones te ayuda a generar más oportunidades para que todas y todos desarrollen confianza y se involucren.\",\n      blocks:[\n        { kind:\"prompts\", icon:\"eye\", label:\"Mirá durante la clase\", items:[\n          \"¿Quiénes *participan más* en las conversaciones?\",\n          \"¿Quiénes *usan la computadora* o los materiales?\",\n          \"¿Quiénes *ayudan a resolver* problemas técnicos?\",\n          \"¿Quiénes suelen quedar *en segundo plano*?\" ] },\n        { kind:\"check\", label:\"Ficha rápida\", items:[\n          \"Participaron *niñas y niños*\",\n          \"*Rotaron* roles\",\n          \"Escuché a estudiantes que *hablan menos*\" ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Pensando en la próxima clase\",\n          prompt:\"¿Qué patrones notás? ¿Qué cambiarías la próxima clase?\" }\n      ] },\n\n    { cat:\"obs\", icon:\"message-square-quote\", title:\"Feedback que impulsa\",\n      desc:\"Una frase breve puede animar a más estudiantes a probar, explicar cómo pensaron o volver a intentar.\",\n      momento:\"Al dar devoluciones\",\n      encontras:[\"Una autoevaluación de qué reconocés en clase\",\"Una escala simple para registrarlo\",\"Un espacio para tu próxima intención\"],\n      porqueLead:\"Los mensajes que reciben moldean cómo se perciben y cuánto se animan.\",\n      porque:\"Observar qué reconocemos ayuda a fortalecer la confianza de más estudiantes y a que se animen a participar, intentar y aprender.\",\n      blocks:[\n        { kind:\"matrix\", label:\"Hoy reconocí principalmente…\",\n          cols:[ {icon:\"smile\",label:\"Varias veces\"}, {icon:\"meh\",label:\"Algunas veces\"}, {icon:\"frown\",label:\"Casi nunca\"} ],\n          rows:[ \"El *esfuerzo* y la persistencia\", \"Las *estrategias* o formas de resolver\", \"La *participación* y las preguntas\", \"Los *avances*, aunque fueran pequeños\" ] },\n        { kind:\"write\", icon:\"message-circle\", label:\"Pensando en la próxima clase\",\n          prompt:\"¿Qué tipo de mensaje te gustaría dar más seguido?\" }\n      ] },\n\n    { cat:\"acc\", icon:\"users-round\", title:\"Estrategias para distribuir la participación\",\n      desc:\"Pequeños cambios en la dinámica para que más estudiantes se animen a pensar, participar y compartir.\",\n      momento:\"Antes de la clase · con el DR\",\n      encontras:[\"Dos estrategias listas para proponer\",\"Pasos concretos para el aula\",\"Un acuerdo para la próxima clase\"],\n      porqueLead:\"Si pedís respuestas al instante, suelen participar siempre los mismos.\",\n      porque:\"Dar tiempo para pensar y anticipar la participación abre la oportunidad a más estudiantes.\",\n      blocks:[\n        { kind:\"ideas\", icon:\"lightbulb\", label:\"Dos ideas para proponer al docente remoto\", items:[\n          { label:\"1 · Pensá, conversá, compartí\",\n            lines:[\"*Dales unos segundos* para pensar individualmente.\",\"Invitá a *conversar en parejas* o pequeños grupos.\",\"Pedí que *compartan sus ideas* con la clase.\"],\n            foot:\"Así más estudiantes *preparan una respuesta* antes de hablar en público.\" },\n          { label:\"2 · Aviso anticipado\",\n            quote:\"En unos minutos voy a pedir que algunas personas compartan qué piensan. Tómense un momento para prepararse.\",\n            foot:\"*Anticipar la participación* ayuda a que más se animen a intervenir.\" }\n        ] },\n        { kind:\"write\", icon:\"handshake\", label:\"Acuerdo para la próxima clase\",\n          prompt:\"¿Qué idea vas a probar y cómo la vas a llevar a la práctica?\" }\n      ] },\n\n    { cat:\"acc\", icon:\"languages\", title:\"Lenguaje inclusivo y no estereotipado\",\n      desc:\"Evitá reforzar asociaciones de género con las disciplinas STEM, en todo momento de la clase.\",\n      momento:\"En todo momento\",\n      encontras:[\"Una pregunta para revisar tu lenguaje\",\"Reemplazos concretos para usar ya\",\"Una idea para acordar con el grupo\"],\n      porqueLead:\"El lenguaje también enseña.\",\n      porque:\"Nombrar a todo el grupo evita reforzar la idea de que las disciplinas STEM son cosa de varones.\",\n      blocks:[\n        { kind:\"prompts\", icon:\"search\", label:\"Primero, revisá\", items:[\n          \"¿Los términos, el lenguaje, la comunicación, la forma y los ejemplos que usás en clase son *inclusivos*?\" ] },\n        { kind:\"terms\", label:\"Probá estos reemplazos\", items:[\n          { antes:\"los alumnos\", despues:\"las y los estudiantes · el estudiantado\" },\n          { antes:\"chicos\", despues:\"chicas y chicos · el grupo\" },\n          { antes:\"los científicos\", despues:\"científicas y científicos\" },\n          { antes:\"bienvenidos\", despues:\"bienvenidas y bienvenidos\" }\n        ], foot:\"También podés construir con el grupo *acuerdos de convivencia* que incluyan el lenguaje inclusivo, y colocar un *cartel visible* con ejemplos concretos.\" },\n        { kind:\"write\", icon:\"handshake\", label:\"Para la próxima clase\",\n          prompt:\"¿Qué término o cambio vas a empezar a usar?\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shield-check\", title:\"Más confianza para enfrentar desafíos\",\n      desc:\"Las dificultades y los errores son oportunidades para construir confianza en las propias capacidades.\",\n      momento:\"Ante un error o frustración\",\n      encontras:[\"Frases para acompañar el error\",\"Ideas para valorar la persistencia\",\"Un acuerdo para la próxima clase\"],\n      porqueLead:\"Las niñas suelen mostrar menos confianza en STEM, aun con igual desempeño.\",\n      porque:\"Cómo acompañamos los desafíos y los errores ayuda a fortalecer esa confianza.\",\n      blocks:[\n        { kind:\"ideas\", icon:\"lightbulb\", label:\"Ideas para probar\", items:[\n          { label:\"Reconocé estrategias\", quote:\"Probaste *distintas opciones* hasta encontrar una solución.\" },\n          { label:\"Normalizá los errores\", quote:\"Equivocarse *también es parte de aprender*.\" },\n          { label:\"Valorá la persistencia\", quote:\"Seguiste *intentando* aunque era difícil.\" },\n          { label:\"Preguntá antes de resolver\", quote:\"¿Qué podrías *probar ahora*?\" }\n        ] },\n        { kind:\"write\", icon:\"handshake\", label:\"Acuerdo para la próxima clase\",\n          prompt:\"¿Qué mensaje o estrategia vas a incorporar, y en qué momento?\" }\n      ] },\n\n    { cat:\"acc\", icon:\"shuffle\", title:\"Diversificar los roles\",\n      desc:\"Que todos los estudiantes tengan oportunidades en tareas organizativas y también técnicas.\",\n      momento:\"Al armar grupos\",\n      encontras:[\"Pasos para rotar los roles técnicos\",\"Un semáforo para registrar al cierre\",\"Recursos extra para asignar roles\"],\n      porqueLead:\"Algunos roles dan más oportunidades de aprender lo técnico.\",\n      porque:\"Distribuirlos entre distintos estudiantes amplía el aprendizaje y la confianza de todo el grupo.\",\n      blocks:[\n        { kind:\"note\", label:\"Preparate antes\", items:[\n          { icon:\"shuffle\", text:\"Prepará *tarjetas o palitos* para asignar roles al azar.\" },\n          { icon:\"users-round\", text:\"Pensá los grupos según la *participación previa*: si una niña participa poco, armá un grupo con más niñas.\" } ] },\n        { kind:\"note\", label:\"Recursos extra para prepararte\", items:[\n          { icon:\"layout-grid\", text:\"*Sub-tarjetas de roles* para asignar\" },\n          { icon:\"clock\", text:\"Link a un *reloj o temporizador* digital\" } ] },\n        { kind:\"check\", label:\"Durante la clase\", items:[\n          \"Establecé un *sistema de rotación* de roles técnicos visible para toda la clase.\",\n          \"Asigná el rol técnico principal a *una niña* en al menos la mitad de las sesiones.\",\n          \"Con pocos dispositivos, usá un *temporizador visible* (un reloj de arena funciona bien).\",\n          \"Recorré el aula: acercarte *reduce la barrera* para pedir ayuda en público.\" ] },\n        { kind:\"semaforo\", label:\"Registrá al final · Semáforo de roles técnicos\", items:[\n          { dot:\"#d92d20\", text:\"Siempre los mismos estudiantes en el rol técnico principal\" },\n          { dot:\"#f5b417\", text:\"Algunos roles rotaron\" },\n          { dot:\"#1f9d4d\", text:\"Roles distribuidos entre niñas y niños\" } ] }\n      ] }\n  ];\n\n  adData = [\n    { dim:\"Qué valorás\", q:\"Pensando en las clases de Pensamiento Computacional a lo largo del año, ¿qué te parece lo más importante?\",\n      opts:[ \"Que los estudiantes desarrollen habilidades para resolver desafíos.\",\n             \"Que los estudiantes se interesen y disfruten las actividades.\",\n             \"Que los estudiantes aprendan a trabajar colaborativamente.\",\n             \"Que todos tengan oportunidades de asumir distintos roles y participar de diferentes maneras.\" ],\n      tools:[2] },\n    { dim:\"Igualdad\", q:\"¿Cuál de estas afirmaciones se acerca más a tu forma de pensar?\",\n      opts:[ \"La mejor forma de garantizar la igualdad es ofrecer las mismas oportunidades a todos los estudiantes.\",\n             \"Comprender las necesidades individuales de cada estudiante es clave para acompañar el aprendizaje.\",\n             \"La forma en que se organizan las actividades influye en quiénes participan más y quiénes menos.\",\n             \"Algunas/os estudiantes pueden necesitar apoyos diferentes para tener las mismas oportunidades de participación.\" ],\n      tools:[0] },\n    { dim:\"Diferencias\", q:\"Cuando algunas/os estudiantes participan menos que otras/os en una actividad, ¿a qué lo atribuís?\",\n      opts:[ \"Las personas tienen intereses diferentes y eso se refleja en la participación.\",\n             \"Algunas/os estudiantes tienen más experiencia o afinidad y se sienten más preparados para la tarea.\",\n             \"La dinámica del grupo puede favorecer que algunas personas participen más que otras.\",\n             \"Los mensajes y expectativas que reciben fuera del aula influyen en cómo participan.\" ],\n      tools:[0] },\n    { dim:\"Roles\", q:\"Durante una actividad de programación observás que siempre son los mismos estudiantes quienes usan el teclado. ¿Qué te parece más importante hacer?\",\n      opts:[ \"Permitir que cada grupo distribuya los roles como prefiera.\",\n             \"Conversar con el grupo para entender cómo se organizaron.\",\n             \"Animar a otras/os estudiantes a probar tareas diferentes.\",\n             \"Coordinar junto al docente remoto estrategias para diversificar los roles.\" ],\n      tools:[5] },\n    { dim:\"Confianza\", q:\"Si una estudiante evita participar porque cree que “no le sale”, ¿qué sentís que está más a tu alcance hacer?\",\n      opts:[ \"Respetar su decisión y acompañarla desde el rol que prefiera asumir.\",\n             \"Animarla a intentarlo nuevamente.\",\n             \"Ayudarla a identificar avances o logros concretos que ya consiguió.\",\n             \"Generar oportunidades graduales para que gane confianza en ese tipo de tareas.\" ],\n      tools:[4,1] },\n    { dim:\"Tu rol\", q:\"Cuando pensás en tu rol durante una clase de Pensamiento Computacional, ¿cuál de estas afirmaciones se acerca más a cómo lo vivís?\",\n      opts:[ \"Mi principal función es acompañar aspectos organizativos de la clase.\",\n             \"Mi principal aporte es brindar apoyo a los estudiantes cuando lo necesitan.\",\n             \"Mi principal aporte es observar cómo participan los estudiantes y ayudarlos a involucrarse.\",\n             \"Mi principal aporte es planificar junto al docente remoto cómo organizar la participación y acompañar el aprendizaje.\" ],\n      tools:[2] }\n  ];\n\n  headerIcon(kind){\n    return ({ prompts:\"list\", check:\"check-square\", matrix:\"smile\", ideas:\"lightbulb\",\n      terms:\"replace\", note:\"info\", semaforo:\"circle-dot\", write:\"message-circle\" })[kind] || \"circle\";\n  }\n\n  componentDidMount(){\n    try {\n      const s = JSON.parse(localStorage.getItem(\"aulaactiva\") || \"{}\");\n      this.setState({\n        checks: s.checks || {}, radios: s.radios || {},\n        texts: s.texts || {}, dates: s.dates || {}, adAnswers: s.adAnswers || {}\n      });\n    } catch(e){}\n    this._icons();\n  }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){\n    if(window.lucide && window.lucide.createIcons){ try { window.lucide.createIcons(); } catch(e){} }\n    else { setTimeout(()=>this._icons(), 120); }\n  }\n  persist(){\n    const { checks, radios, texts, dates, adAnswers } = this.state;\n    try { localStorage.setItem(\"aulaactiva\", JSON.stringify({ checks, radios, texts, dates, adAnswers })); } catch(e){}\n  }\n  setCheck(k){ this.setState(s => ({ checks:{ ...s.checks, [k]: !s.checks[k] } }), () => this.persist()); }\n  setRadio(k,v){ this.setState(s => ({ radios:{ ...s.radios, [k]: v } }), () => this.persist()); }\n  setText(k,v){ this.setState(s => ({ texts:{ ...s.texts, [k]: v } }), () => this.persist()); }\n  setDate(k,v){ this.setState(s => ({ dates:{ ...s.dates, [k]: v } }), () => this.persist()); }\n\n  rich(str, color){\n    if(str == null) return str;\n    const parts = String(str).split(/\\*([^*]+)\\*/g);\n    return React.createElement(React.Fragment, null, parts.map((p,i) =>\n      i % 2 === 1 ? React.createElement(\"strong\", { key:i, style:{ color, fontWeight:800 } }, p) : p\n    ));\n  }\n\n  computeRecs(){\n    const { adAnswers } = this.state;\n    const priority = [], secondary = [];\n    this.adData.forEach((q,qi) => {\n      const a = adAnswers[qi];\n      if(a === undefined) return;\n      const target = (a <= 1) ? priority : secondary;\n      q.tools.forEach(t => target.push(t));\n    });\n    const out = [];\n    const push = arr => arr.forEach(t => { if(!out.includes(t)) out.push(t); });\n    push(priority); push(secondary); push([0,5,4]);\n    return out.slice(0,3);\n  }\n\n  recsMessage(){\n    const { adAnswers } = this.state;\n    let ab=0, cd=0;\n    this.adData.forEach((q,qi) => { const a=adAnswers[qi]; if(a===undefined) return; if(a<=1) ab++; else cd++; });\n    if(cd >= 5) return \"Tenés una mirada muy atenta a cómo las dinámicas del aula influyen en la participación. Estas herramientas te ayudan a sostener y profundizar eso, clase a clase.\";\n    if(ab >= 4) return \"Cada gesto en el aula puede abrir nuevas oportunidades de participación. Estas herramientas son un gran punto de partida para empezar a observar y actuar.\";\n    return \"Ya reconocés varias de las dinámicas que influyen en la participación. Estas herramientas te dan estrategias concretas para acompañarlas en el día a día.\";\n  }\n\n  renderVals(){\n    const { open, checks, radios, texts, dates, adOpen, adStep, adAnswers } = this.state;\n    const tint = (c) => c + \"14\";\n    const VIOLET = \"#82378C\";\n    const R = (s) => this.rich(s, open!=null ? this.cats[this.data[open].cat].color : \"#000\");\n\n    const hexShadow = (hex) => {\n      const h = hex.replace(\"#\",\"\"); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);\n      return `rgba(${r},${g},${b},.34)`;\n    };\n    const accents = [\"#FFC800\",\"#F09100\",\"#FFC800\",\"#50AF32\",\"#FFC800\",\"#5AC8F0\"];\n    const tools = this.data.map((t,i) => {\n      const c = this.cats[t.cat].color;\n      return { title:t.title, icon:t.icon, momento:t.momento,\n        catLabel:this.cats[t.cat].label, color:c, tint:tint(c),\n        shadow:hexShadow(c), accent:accents[i % accents.length],\n        n:String(i+1).padStart(2,\"0\"),\n        encontras:t.encontras, open:() => this.setState({ open:i }) };\n    });\n\n    let active = {};\n    if(open !== null){\n      const t = this.data[open], color = this.cats[t.cat].color, tn = tint(color);\n      active = {\n        title:t.title, desc:t.desc, icon:t.icon, momento:t.momento,\n        catLabel:this.cats[t.cat].label, color, tint:tn, porque:t.porque || \"\", porqueLead:t.porqueLead || \"\",\n        blocks: t.blocks.map((b,bi) => {\n          const o = { label:b.label, hIcon:b.icon || this.headerIcon(b.kind),\n            isPrompts:b.kind===\"prompts\", isCheck:b.kind===\"check\", isMatrix:b.kind===\"matrix\",\n            isIdeas:b.kind===\"ideas\", isTerms:b.kind===\"terms\", isNote:b.kind===\"note\",\n            isSemaforo:b.kind===\"semaforo\", isWrite:b.kind===\"write\" };\n          if(b.kind === \"prompts\"){ o.items = b.items.map(s => R(s)); }\n          else if(b.kind === \"check\"){\n            o.items = b.items.map((text,ii) => {\n              const key = open+\"-\"+bi+\"-\"+ii, ck = !!checks[key];\n              return { text:R(text), checked:ck, boxBg: ck ? color : \"#fff\", toggle:() => this.setCheck(key) };\n            });\n          }\n          else if(b.kind === \"matrix\"){\n            o.cols = b.cols;\n            o.rows = b.rows.map((label,ri) => {\n              const key = open+\"-\"+bi+\"-\"+ri, sel = radios[key];\n              return { label:R(label), opts: b.cols.map((col,ci) => ({\n                selected: sel===ci, bg: sel===ci ? color+\"1a\" : \"#fff\",\n                border: sel===ci ? color : \"#e7e1d4\", select:() => this.setRadio(key,ci) })) };\n            });\n          }\n          else if(b.kind === \"ideas\"){\n            o.items = b.items.map(it => ({ label:it.label, quote: it.quote ? R(it.quote) : \"\",\n              hasLines: !!(it.lines && it.lines.length), lines: (it.lines || []).map(l => R(l)), foot: it.foot ? R(it.foot) : \"\" }));\n          }\n          else if(b.kind === \"terms\"){ o.items = b.items; o.foot = b.foot ? R(b.foot) : \"\"; }\n          else if(b.kind === \"note\"){ o.items = b.items.map(it => ({ icon:it.icon, text:R(it.text) })); }\n          else if(b.kind === \"semaforo\"){\n            const key = open+\"-\"+bi, sel = radios[key];\n            o.items = b.items.map((it,oi) => ({ dot:it.dot, text:it.text, selected: sel===oi,\n              bg: sel===oi ? color+\"10\" : \"#fff\", border: sel===oi ? color : \"#e7e1d4\", select:() => this.setRadio(key,oi) }));\n          }\n          else if(b.kind === \"write\"){\n            const key = open+\"-\"+bi;\n            o.prompt = b.prompt; o.value = texts[key] || \"\"; o.onInput = (e) => this.setText(key, e.target.value);\n          }\n          return o;\n        })\n      };\n    }\n\n    // ── AUTODIAGNÓSTICO ──\n    const adIsResults = adOpen && adStep >= 6;\n    const adIsQuestion = adOpen && adStep < 6;\n    let adQuestionText = \"\", adDimension = \"\", adOptions = [], adCanNext = false;\n    if(adIsQuestion){\n      const q = this.adData[adStep];\n      adQuestionText = q.q; adDimension = q.dim;\n      const sel = adAnswers[adStep];\n      adCanNext = sel !== undefined;\n      const letters = [\"A\",\"B\",\"C\",\"D\"];\n      adOptions = q.opts.map((text,oi) => {\n        const isSel = sel === oi;\n        return { letter:letters[oi], text, selected:isSel,\n          border: isSel ? VIOLET : \"#e7e1d4\", bg: isSel ? VIOLET+\"0f\" : \"#fff\",\n          chipBg: isSel ? VIOLET : \"#f1ece1\", chipColor: isSel ? \"#fff\" : \"#9aa1a8\",\n          select:() => this.setState(s => ({ adAnswers:{ ...s.adAnswers, [adStep]: oi } }), () => this.persist()) };\n      });\n    }\n    let adRecs = [], adMessage = \"\";\n    if(adIsResults){\n      adMessage = this.recsMessage();\n      adRecs = this.computeRecs().map(i => {\n        const t = this.data[i], c = this.cats[t.cat].color;\n        return { title:t.title, icon:t.icon, color:c, catLabel:this.cats[t.cat].label,\n          open:() => this.setState({ adOpen:false, open:i }) };\n      });\n    }\n\n    const dateKey = open + \"-date\";\n    return {\n      // cards + ficha\n      tools, active, modalOpen: open !== null,\n      dateValue: open === null ? \"\" : (dates[dateKey] || \"\"),\n      dateInput: (e) => this.setDate(dateKey, e.target.value),\n      closeModal: () => this.setState({ open:null }),\n      stop: (e) => e.stopPropagation(),\n      saveFicha: () => window.print(),\n      foroUrl: this.foroUrl,\n      formUrl: this.formUrl,\n      // autodiagnóstico\n      adOpen, adIsQuestion, adIsResults,\n      adProgressLabel: \"Pregunta \" + (Math.min(adStep,5)+1) + \" de 6\",\n      adProgressPct: (((Math.min(adStep,6))/6)*100) + \"%\",\n      adDimension, adQuestionText, adOptions,\n      adShowBack: adStep > 0,\n      adNextLabel: adStep >= 5 ? \"Ver mi devolución\" : \"Siguiente\",\n      adNextBg: adCanNext ? VIOLET : \"#cdbcd3\",\n      adNextCursor: adCanNext ? \"pointer\" : \"not-allowed\",\n      adMessage, adRecs,\n      startAd: () => this.setState({ adOpen:true, adStep:0 }),\n      closeAd: () => this.setState({ adOpen:false }),\n      adNext: () => { if(adAnswers[adStep] === undefined) return; this.setState(s => ({ adStep: s.adStep + 1 })); },\n      adBack: () => this.setState(s => ({ adStep: Math.max(0, s.adStep - 1) })),\n      restartAd: () => this.setState({ adStep:0, adAnswers:{} }, () => this.persist()),\n      goHerramientas: () => { this.setState({ adOpen:false }); window.location.hash = \"#herramientas\"; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
